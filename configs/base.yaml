# sensorcluster — default training configuration.
# Override any value via CLI (--data.path ...) or env (SENSORCLUSTER_DATA__PATH=...).

random_seed: 42

data:
  path: data/raw/data_sensors.csv
  sensor_columns_prefix: "Sensor "
  n_sensors: 20
  label_column: Label
  # Tolerance band around the documented [-1, 1] range so we don't reject
  # mildly out-of-distribution upstream values; pandera schema enforces this.
  sensor_min: -1.05
  sensor_max: 1.05
  valid_labels: [1.0, 2.0, 3.0]

preprocess:
  imputer_strategy: median   # median > mean for sensor data with sporadic spikes

pca:
  # n_components wins over variance_target when both are set.
  # Notebook 04 multi-seed sweep showed n_components=5 + HDBSCAN(mcs=10, ms=5)
  # produces the best CV ARI on this dataset (+0.085 averaged across 10 seeds
  # vs +0.052 for the original variance_target=0.95 default — a 64% lift).
  # PCA dim and HDBSCAN params must be tuned together; lower-dim space is
  # denser, so HDBSCAN needs a tighter min_samples threshold to compensate.
  # Set n_components: null to fall back to the variance_target heuristic.
  n_components: 5
  variance_target: 0.95

hdbscan:
  # NOTE: defaults tuned jointly with PCA n_components=5 (see notebook 04).
  # min_samples=5 (rather than the older 3) is necessary in the denser
  # 5-dim PCA space — without it HDBSCAN forms tiny spurious clusters that
  # don't generalize under cross-validation. min_cluster_size=10 is also
  # the multi-seed-CV winner.
  # On real production data with discriminative features you'll likely want
  # even larger values (mcs=15+, ms=5+); sweep in notebook 03.
  min_cluster_size: 10
  min_samples: 5
  metric: euclidean
  cluster_selection_method: eom
  prediction_data: true      # required for approximate_predict at inference time

novelty:
  # GLOSH score above this threshold flips is_novel=true.
  # Tuned on training reference; APIs always return raw score so it can be re-thresholded downstream.
  glosh_threshold: 0.7

label_propagation:
  # Per-cluster purity below this triggers a warning in evaluation_report.md.
  purity_warning: 0.6
  # When mapping a cluster to a label, weight votes by 1/class_count
  # so the 10/10/20 imbalance doesn't bias toward class 3.
  weighted: true

evaluation:
  cv_folds: 5
  bootstrap_n_runs: 30
  bootstrap_sample_frac: 0.8

inference:
  top_neighbors: 3           # /predict returns the 3 nearest labeled historical points

artifacts_dir: artifacts

mlflow:
  enabled: true
  tracking_uri: file:./mlruns
  experiment_name: sensorcluster

logging:
  level: INFO
  json_logs: false           # console-friendly in dev; set true (or env) in prod
