name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: lint, type-check, test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build deps for hdbscan
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Install package with all extras
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install -e ".[serve,train,dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy
        run: mypy src/
        continue-on-error: true   # advisory until the codebase has been through one mypy pass in CI

      - name: pytest with coverage
        run: pytest --cov=src/sensorcluster --cov-report=term-missing --cov-fail-under=80

  docker-build:
    name: docker images build
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build serving image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.serve
          push: false
          tags: sensorcluster-serve:ci

      - name: Build training image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.train
          push: false
          tags: sensorcluster-train:ci
